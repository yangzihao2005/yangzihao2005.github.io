<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">

        color: #333;

      a { transition: opacity 0.2s; }
      a:hover { opacity: 0.8; }
    </style>
  </head>
  <body>
    <div style="
	background-color:#f1f1f1;
	text-align:center;
	padding:40px;
	">
      	<img src="images/ikun.png" alt="yzh" width="80px" height="80px">
    </div>
    <div style="
		max-width:700px;
		margin:30px auto;
		padding:15px;
		line-height:1.7;
	">
		<h2 style="text-align:center;">📚 笔记/博客链接</h2>
		<ul style="list-style:none; padding:0;">
			<li style="margin:15px 0; padding:15px; background:#f9f9f9; border-radius:8px;">
				<a href="https://blog.csdn.net/2302_79013877?spm=1000.2115.3001.5343" target="_blank" style="font-size:18px; text-decoration:none; color:#0366d6;">
					🐍 CSDN博客
				</a>
				<p style="margin:5px 0 0 0; color:#666; font-size:14px;">C语言 · 数据结构 · C++</p>
			</li>
			<li style="margin:15px 0; padding:15px; background:#f9f9f9; border-radius:8px;">
				<a href="https://www.yuque.com/dashboard" target="_blank" style="font-size:18px; text-decoration:none; color:#0366d6;">
					📖 学习笔记
				</a>
				<p style="margin:5px 0 0 0; color:#666; font-size:14px;">Linux · 高数 · 英语</p>
			</li>
			
			<li style="margin:15px 0; padding:15px; background:#f9f9f9; border-radius:8px;">
				<a href="https://gitee.com/haodegitee" target="_blank" style="font-size:18px; text-decoration:none; color:#0366d6;">
					📖 Gitee仓库
				</a>
			</li>
		</ul>
	</div>

    <!-- ===== 资源收藏 ===== -->
    <div style="max-width:700px; margin:30px auto; padding:15px; line-height:1.7;">
      <h2 style="text-align:center;">📎 资源收藏</h2>

      <!-- 添加表单 -->
      <div style="display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;">
        <input id="linkName" placeholder="名称" style="flex:2; min-width:100px; border:1px solid #ddd; border-radius:6px; padding:8px 12px; font-size:14px;">
        <input id="linkUrl" placeholder="链接地址" style="flex:4; min-width:160px; border:1px solid #ddd; border-radius:6px; padding:8px 12px; font-size:14px;">
        <button onclick="addLink()" style="background:#0366d6; color:#fff; border:none; border-radius:6px; padding:8px 20px; cursor:pointer; font-size:14px;">添加</button>
      </div>

      <!-- 列表 -->
      <div id="linkList"></div>
      <div id="linkStatus" style="text-align:center; color:#999; font-size:14px; margin-top:10px;"></div>
    </div>

    <div style="
	background-color:#f1f1f1;
	text-align:center;
	padding:40px;
	font-size:12px;
	">
	<p>我的网站</p>
	<a href="https://www.yuque.com/dashboard">友情链接</a>
    </div>

<script>
// 数据存在 GitHub 仓库的 data/links.json 里，所有设备共用

const REPO = 'yangzihao2005/yangzihao2005.github.io';
const FILE_PATH = 'data/links.json';
const RAW_URL = `https://raw.githubusercontent.com/${REPO}/main/${FILE_PATH}`;
const API_URL = `https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`;

// 读取已有数据
async function readLinks() {
  const res = await fetch(RAW_URL);
  if (!res.ok) return [];          // 还没有文件，返回空数组
  return await res.json();
}

// 保存数据到 GitHub
async function saveLinks(links) {
  const token = localStorage.getItem('github_token');
  if (!token) return setupToken();

  // 1. 先获取当前文件的 sha（更新文件时需要）
  let sha = null;
  const res = await fetch(API_URL, { headers: { Authorization: 'token ' + token } });
  if (res.ok) sha = (await res.json()).sha;

  // 2. 把数据转成 base64（GitHub API 要求）
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(links, null, 2))));

  // 3. 更新文件
  const r = await fetch(API_URL, {
    method: 'PUT',
    headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: 'update links', content, sha })
  });
  if (!r.ok) throw new Error('保存失败: ' + (await r.json()).message);
}

// 首次使用：引导用户设置 token
function setupToken() {
  const token = prompt(
    '首次使用，请输入你的 GitHub Token。\n\n' +
    '如何获取：\n' +
    '1. 打开 https://github.com/settings/tokens\n' +
    '2. 点 "Generate new token (classic)"\n' +
    '3. 勾选 repo 权限\n' +
    '4. 生成后粘贴到下方'
  );
  if (token) {
    localStorage.setItem('github_token', token);
    loadLinks();   // 重新加载
  }
}

// ===== 增 / 删 =====
async function addLink() {
  const name = document.getElementById('linkName').value.trim();
  const url  = document.getElementById('linkUrl').value.trim();
  if (!name || !url) return alert('请填写名称和链接');

  const links = await readLinks();
  links.push({ name, url });
  document.getElementById('linkName').value = '';
  document.getElementById('linkUrl').value = '';

  setStatus('保存中...');
  try {
    await saveLinks(links);
    setStatus('保存成功 ✅');
    renderLinks(links);
  } catch (e) {
    setStatus('保存失败: ' + e.message);
  }
}

async function delLink(index) {
  if (!confirm('确定删除？')) return;
  const links = await readLinks();
  links.splice(index, 1);

  setStatus('保存中...');
  try {
    await saveLinks(links);
    setStatus('已删除');
    renderLinks(links);
  } catch (e) {
    setStatus('删除失败: ' + e.message);
  }
}

// ===== 渲染 =====
function renderLinks(links) {
  const el = document.getElementById('linkList');
  if (!links.length) {
    el.innerHTML = '<div style="color:#bbb;font-size:14px;text-align:center;padding:20px;">还没有资源，添加一条吧</div>';
    return;
  }
  el.innerHTML = links.map((item, i) =>
    `<div style="display:flex; align-items:center; padding:12px 16px; background:#f9f9f9; border-radius:8px; margin-bottom:8px;">
      <a href="${item.url}" target="_blank" style="flex:1; text-decoration:none; color:#0366d6; font-weight:500; font-size:15px;">
        ${escapeHtml(item.name)}
      </a>
      <span onclick="delLink(${i})" style="color:#ccc; cursor:pointer; font-size:18px; padding:0 6px;">✕</span>
    </div>`
  ).join('');
}

function setStatus(msg) {
  document.getElementById('linkStatus').textContent = msg;
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

// ===== 启动 =====
(async function load() {
  const links = await readLinks();
  renderLinks(links);
  setStatus('数据来自 GitHub，多设备同步 ☁️');
})();
</script>
  </body>
</html>
